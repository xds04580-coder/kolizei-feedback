<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KOLIZEI — Обратная связь</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #080c10;
    --surface: #0d1318;
    --card: #111820;
    --border: #1e2d3d;
    --accent: #00d4ff;
    --accent2: #ff6b35;
    --green: #00ff88;
    --text: #c8d8e8;
    --muted: #4a6070;
    --glow: 0 0 20px rgba(0,212,255,0.3);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    font-family: 'Rajdhani', sans-serif;
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Animated grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,212,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,212,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  /* Scanline overlay */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.08) 2px,
      rgba(0,0,0,0.08) 4px
    );
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 680px;
    margin: 0 auto;
    padding: 40px 20px 60px;
  }

  /* Header */
  .header {
    text-align: center;
    margin-bottom: 40px;
    animation: fadeDown 0.6s ease forwards;
  }

  .logo-tag {
    display: inline-block;
    font-family: 'Orbitron', monospace;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 4px;
    color: var(--accent);
    border: 1px solid var(--accent);
    padding: 4px 12px;
    margin-bottom: 16px;
    text-transform: uppercase;
  }

  .title {
    font-family: 'Orbitron', monospace;
    font-size: clamp(28px, 6vw, 48px);
    font-weight: 900;
    color: #fff;
    letter-spacing: 2px;
    line-height: 1.1;
  }

  .title span {
    color: var(--accent);
    text-shadow: var(--glow);
  }

  .subtitle {
    margin-top: 10px;
    font-size: 16px;
    font-weight: 300;
    color: var(--muted);
    letter-spacing: 1px;
  }

  /* Divider */
  .divider {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 28px 0;
  }
  .divider::before, .divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--border));
  }
  .divider::after {
    background: linear-gradient(90deg, var(--border), transparent);
  }
  .divider-dot {
    width: 6px; height: 6px;
    background: var(--accent);
    transform: rotate(45deg);
    box-shadow: var(--glow);
  }

  /* Card */
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 2px;
    padding: 28px;
    margin-bottom: 16px;
    position: relative;
    animation: fadeUp 0.5s ease forwards;
    opacity: 0;
  }
  .card:nth-child(1) { animation-delay: 0.1s; }
  .card:nth-child(2) { animation-delay: 0.2s; }
  .card:nth-child(3) { animation-delay: 0.3s; }
  .card:nth-child(4) { animation-delay: 0.4s; }

  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 3px; height: 100%;
    background: linear-gradient(180deg, var(--accent), transparent);
  }

  .card-title {
    font-family: 'Orbitron', monospace;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 3px;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .card-title .icon {
    width: 20px; height: 20px;
    min-width: 20px; min-height: 20px;
    background: rgba(0,212,255,0.1);
    border: 1px solid var(--accent);
    display: flex; align-items: center; justify-content: center;
    font-size: 12px;
    line-height: 1;
    flex-shrink: 0;
  }

  /* Rating section */
  .rating-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    flex-wrap: nowrap;
  }

  .rating-label {
    font-size: 15px;
    font-weight: 500;
    color: var(--text);
    letter-spacing: 0.5px;
    flex: 1;
    min-width: 0;
  }

  .stars {
    display: flex;
    gap: 6px;
    flex-shrink: 0;
    flex-wrap: nowrap;
  }

  .star {
    width: 36px; height: 36px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px;
    color: var(--muted);
    transition: all 0.2s;
    position: relative;
  }

  .star:hover,
  .star.active {
    color: var(--accent2);
    text-shadow: 0 0 12px rgba(255,107,53,0.6);
    transform: scale(1.15);
  }

  .star svg {
    width: 22px; height: 22px;
    fill: currentColor;
    transition: all 0.2s;
  }

  .rating-value {
    font-family: 'Orbitron', monospace;
    font-size: 13px;
    color: var(--accent);
    min-width: 20px;
    text-align: right;
  }

  /* Separator line between ratings */
  .rating-separator {
    height: 1px;
    background: var(--border);
    margin: 14px 0;
  }

  /* Input fields */
  .field-group {
    margin-bottom: 16px;
  }

  .field-label {
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
    display: block;
  }

  .field-input {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Rajdhani', sans-serif;
    font-size: 16px;
    font-weight: 500;
    padding: 12px 16px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    border-radius: 1px;
  }

  .field-input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 1px var(--accent), inset 0 0 20px rgba(0,212,255,0.03);
  }

  .field-input::placeholder { color: var(--muted); }

  textarea.field-input {
    resize: vertical;
    min-height: 110px;
    line-height: 1.5;
  }

  /* Two columns for name/phone */
  .fields-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
  }
  @media (max-width: 480px) {
    .fields-row { grid-template-columns: 1fr; }
  }

  /* Submit button */
  .btn-submit {
    width: 100%;
    padding: 18px;
    background: transparent;
    border: 2px solid var(--accent);
    color: var(--accent);
    font-family: 'Orbitron', monospace;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 4px;
    text-transform: uppercase;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: all 0.3s;
    animation: fadeUp 0.5s 0.5s ease forwards;
    opacity: 0;
  }

  .btn-submit::before {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--accent);
    transform: translateX(-100%);
    transition: transform 0.3s ease;
    z-index: 0;
  }

  .btn-submit:hover::before { transform: translateX(0); }
  .btn-submit:hover { color: var(--bg); }

  .btn-submit span { position: relative; z-index: 1; }

  .btn-submit:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }

  /* Success screen */
  .success-screen {
    display: none;
    text-align: center;
    padding: 60px 20px;
    animation: fadeUp 0.5s ease forwards;
  }

  .success-icon {
    width: 80px; height: 80px;
    border: 2px solid var(--green);
    border-radius: 50%;
    margin: 0 auto 24px;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 0 30px rgba(0,255,136,0.3);
    animation: pulse 2s infinite;
  }

  .success-icon svg { width: 36px; height: 36px; stroke: var(--green); fill: none; stroke-width: 2.5; }

  .success-title {
    font-family: 'Orbitron', monospace;
    font-size: 22px;
    font-weight: 900;
    color: #fff;
    letter-spacing: 2px;
    margin-bottom: 8px;
  }

  .success-subtitle {
    font-size: 15px;
    color: var(--muted);
    letter-spacing: 0.5px;
  }

  .success-id {
    margin-top: 20px;
    display: inline-block;
    font-family: 'Orbitron', monospace;
    font-size: 11px;
    letter-spacing: 2px;
    color: var(--accent);
    border: 1px solid var(--border);
    padding: 6px 14px;
  }

  /* DB preview */
  .db-section {
    margin-top: 40px;
    animation: fadeUp 0.5s 0.6s ease forwards;
    opacity: 0;
  }

  .db-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }

  .db-title {
    font-family: 'Orbitron', monospace;
    font-size: 10px;
    letter-spacing: 3px;
    color: var(--muted);
    text-transform: uppercase;
  }

  .db-count {
    font-family: 'Orbitron', monospace;
    font-size: 10px;
    color: var(--accent);
    letter-spacing: 1px;
  }

  .db-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }

  .db-table th {
    text-align: left;
    padding: 8px 10px;
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    border-bottom: 1px solid var(--border);
    font-weight: 600;
  }

  .db-table td {
    padding: 10px 10px;
    border-bottom: 1px solid rgba(30,45,61,0.5);
    color: var(--text);
    vertical-align: middle;
  }

  .db-table tr:last-child td { border-bottom: none; }

  .db-table tr {
    transition: background 0.15s;
  }
  .db-table tr:hover td { background: rgba(0,212,255,0.03); }

  .db-stars {
    color: var(--accent2);
    font-size: 11px;
    letter-spacing: 1px;
  }

  .new-row td {
    animation: highlight 1s ease forwards;
  }

  /* Validation */
  .error-msg {
    font-size: 11px;
    letter-spacing: 1px;
    color: #ff4466;
    margin-top: 5px;
    display: none;
  }
  .field-input.error { border-color: #ff4466; }

  /* Animations */
  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-20px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes highlight {
    0% { background: rgba(0,255,136,0.1); }
    100% { background: transparent; }
  }
  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 30px rgba(0,255,136,0.3); }
    50% { box-shadow: 0 0 50px rgba(0,255,136,0.6); }
  }
</style>
</head>
<body>
<div class="container">

  <!-- Header -->
  <div class="header">
    <div class="logo-tag">KOLIZEI // FEEDBACK</div>
    <h1 class="title"><span>KOLIZEI</span></h1>
    <p class="subtitle">Ваше мнение помогает нам стать лучше</p>
  </div>

  <!-- Form -->
  <div id="formSection">

    <!-- Rating card -->
    <div class="card">
      <div class="card-title">
        <div class="icon"><svg width="11" height="11" viewBox="0 0 24 24" fill="var(--accent)"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg></div>
        Оценка
      </div>

      <!-- PC Rating -->
      <div class="rating-row">
        <div class="rating-label">Компьютеры и девайсы</div>
        <div class="stars" id="stars-pc">
          <div class="star" data-group="pc" data-val="1"><svg viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg></div>
          <div class="star" data-group="pc" data-val="2"><svg viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg></div>
          <div class="star" data-group="pc" data-val="3"><svg viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg></div>
          <div class="star" data-group="pc" data-val="4"><svg viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg></div>
          <div class="star" data-group="pc" data-val="5"><svg viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg></div>
        </div>
        <div class="rating-value" id="val-pc">—</div>
      </div>

      <div class="rating-separator"></div>

      <!-- Service Rating -->
      <div class="rating-row">
        <div class="rating-label">Обслуживание персонала</div>
        <div class="stars" id="stars-service">
          <div class="star" data-group="service" data-val="1"><svg viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg></div>
          <div class="star" data-group="service" data-val="2"><svg viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg></div>
          <div class="star" data-group="service" data-val="3"><svg viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg></div>
          <div class="star" data-group="service" data-val="4"><svg viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg></div>
          <div class="star" data-group="service" data-val="5"><svg viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg></div>
        </div>
        <div class="rating-value" id="val-service">—</div>
      </div>
    </div>

    <!-- Comment -->
    <div class="card">
      <div class="card-title">
        <div class="icon"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></div>
        Комментарий
      </div>
      <textarea class="field-input" id="comment" placeholder="Расскажите подробнее о вашем визите..."></textarea>
    </div>

    <!-- Personal info -->
    <div class="card">
      <div class="card-title">
        <div class="icon"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></div>
        Ваши данные
      </div>
      <div class="fields-row">
        <div class="field-group">
          <label class="field-label" for="name">Имя</label>
          <input class="field-input" id="name" type="text" placeholder="Введите имя" autocomplete="given-name">
          <div class="error-msg" id="err-name">Введите имя</div>
        </div>
        <div class="field-group">
          <label class="field-label" for="phone">Номер телефона</label>
          <input class="field-input" id="phone" type="tel" placeholder="+7 (___) ___-__-__" autocomplete="tel">
          <div class="error-msg" id="err-phone">Введите корректный номер</div>
        </div>
      </div>
    </div>

    <!-- Submit -->
    <button class="btn-submit" id="submitBtn" onclick="submitForm()">
      <span>▶ &nbsp; Отправить отзыв</span>
    </button>

  </div>

  <!-- Success screen -->
  <div class="success-screen" id="successScreen">
    <div class="success-icon">
      <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
    </div>
    <div class="success-title">ПРИНЯТО!</div>
    <div class="success-subtitle">Спасибо за ваш отзыв. Мы обязательно его учтём.</div>
    <div class="success-id" id="successId"></div>
  </div>

<script>
  const ratings = { pc: 0, service: 0 };
  const db = [];

  // Auto-detect API: same origin in prod, localhost in dev
  const API = (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1')
    ? 'http://localhost:8000' : '';

  // Star rating logic
  document.querySelectorAll('.star').forEach(star => {
    star.addEventListener('click', () => {
      const group = star.dataset.group;
      const val = parseInt(star.dataset.val);
      ratings[group] = val;
      updateStars(group, val);
      document.getElementById('val-' + group).textContent = val + '/5';
    });

    star.addEventListener('mouseenter', () => {
      const group = star.dataset.group;
      const val = parseInt(star.dataset.val);
      highlightStars(group, val);
    });

    star.addEventListener('mouseleave', () => {
      const group = star.dataset.group;
      updateStars(group, ratings[group]);
    });
  });

  function updateStars(group, val) {
    document.querySelectorAll(`.star[data-group="${group}"]`).forEach(s => {
      s.classList.toggle('active', parseInt(s.dataset.val) <= val);
    });
  }

  function highlightStars(group, val) {
    document.querySelectorAll(`.star[data-group="${group}"]`).forEach(s => {
      s.classList.toggle('active', parseInt(s.dataset.val) <= val);
    });
  }

  // Phone mask
  const phoneInput = document.getElementById('phone');
  phoneInput.addEventListener('input', function(e) {
    let v = this.value.replace(/\D/g, '');
    if (v.startsWith('8')) v = '7' + v.slice(1);
    if (v.startsWith('7')) {
      const p = v.slice(1);
      this.value = '+7 (' + (p.slice(0,3) || '') +
        (p.length > 3 ? ') ' + p.slice(3,6) : '') +
        (p.length > 6 ? '-' + p.slice(6,8) : '') +
        (p.length > 8 ? '-' + p.slice(8,10) : '');
    } else if (v.length > 0) {
      this.value = '+' + v;
    }
  });

  function validateForm() {
    let ok = true;
    const name = document.getElementById('name').value.trim();
    const phone = document.getElementById('phone').value.trim();

    // Name
    const errName = document.getElementById('err-name');
    const nameInput = document.getElementById('name');
    if (!name || name.length < 2) {
      nameInput.classList.add('error');
      errName.style.display = 'block';
      ok = false;
    } else {
      nameInput.classList.remove('error');
      errName.style.display = 'none';
    }

    // Phone
    const errPhone = document.getElementById('err-phone');
    const phoneEl = document.getElementById('phone');
    const digits = phone.replace(/\D/g, '');
    if (digits.length < 11) {
      phoneEl.classList.add('error');
      errPhone.style.display = 'block';
      ok = false;
    } else {
      phoneEl.classList.remove('error');
      errPhone.style.display = 'none';
    }

    return ok;
  }

  async function submitForm() {
    if (!validateForm()) return;

    const btn = document.getElementById('submitBtn');
    btn.disabled = true;
    btn.querySelector('span').textContent = '⏳  Отправка...';

    const payload = {
      name:       document.getElementById('name').value.trim(),
      phone:      document.getElementById('phone').value.trim(),
      pc_rating:  ratings.pc  || null,
      svc_rating: ratings.service || null,
      comment:    document.getElementById('comment').value.trim()
    };

    try {
      const res = await fetch(API + '/api/reviews', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });
      if (!res.ok) throw new Error('Server error');
      const data = await res.json();

      // Add to local table
      const now = new Date();
      const timeStr = now.toLocaleTimeString('ru-RU', {hour:'2-digit',minute:'2-digit'}) +
        ' · ' + now.toLocaleDateString('ru-RU', {day:'2-digit',month:'2-digit'});
      db.unshift({ id: data.id, name: payload.name, phone: payload.phone,
        pc: payload.pc_rating, service: payload.svc_rating,
        comment: payload.comment || '—', time: timeStr });
      renderDB();

      document.getElementById('formSection').style.display = 'none';
      const ss = document.getElementById('successScreen');
      ss.style.display = 'block';
      document.getElementById('successId').textContent = '# REF-' + String(data.id).padStart(4, '0');
      window.scrollTo({ top: 0, behavior: 'smooth' });

      setTimeout(() => {
        ss.style.display = 'none';
        resetForm();
        document.getElementById('formSection').style.display = 'block';
      }, 4000);

    } catch (e) {
      alert('Ошибка отправки. Проверьте соединение и попробуйте снова.');
    } finally {
      btn.disabled = false;
      btn.querySelector('span').textContent = '▶ \u00a0 Отправить отзыв';
    }
  }

  function renderDB() {
    const body = document.getElementById('dbBody');
    document.getElementById('dbCount').textContent = db.length + ' ' + (db.length === 1 ? 'запись' : 'записей');

    body.innerHTML = db.map((r, i) => `
      <tr class="${i === 0 ? 'new-row' : ''}">
        <td style="font-family:Orbitron,monospace;font-size:10px;color:var(--muted)">${String(r.id).padStart(4,'0')}</td>
        <td style="font-weight:600">${r.name}</td>
        <td style="font-family:monospace;font-size:12px;color:var(--muted)">${r.phone}</td>
        <td><span class="db-stars">${r.pc !== '—' ? '★'.repeat(r.pc) + '<span style="color:var(--muted)">' + '★'.repeat(5-r.pc) + '</span>' : r.pc}</span></td>
        <td><span class="db-stars">${r.service !== '—' ? '★'.repeat(r.service) + '<span style="color:var(--muted)">' + '★'.repeat(5-r.service) + '</span>' : r.service}</span></td>
        <td style="max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--muted);font-size:13px">${r.comment}</td>
        <td style="font-size:12px;color:var(--muted);white-space:nowrap">${r.time}</td>
      </tr>
    `).join('');
  }

  function resetForm() {
    ratings.pc = 0; ratings.service = 0;
    updateStars('pc', 0); updateStars('service', 0);
    document.getElementById('val-pc').textContent = '—';
    document.getElementById('val-service').textContent = '—';
    document.getElementById('comment').value = '';
    document.getElementById('name').value = '';
    document.getElementById('phone').value = '';
    document.querySelectorAll('.field-input').forEach(el => el.classList.remove('error'));
    document.querySelectorAll('.error-msg').forEach(el => el.style.display = 'none');
  }
</script>
</body>
</html>
